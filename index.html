<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Big Sis!</title>
<style>
  body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ffdee9, #b5fffc);
    font-family: 'Comic Sans MS', cursive, sans-serif;
    text-align: center;
    overflow: hidden;
  }

  h1 {
    color: #0077ff;
    font-size: 2.5em;
    margin-top: 20px;
  }

  /* Cake */
  .cake {
    margin: 40px auto;
    width: 160px;
    position: relative;
  }
  .layer {
    width: 100%;
    height: 50px;
    border-radius: 10px;
    margin: 5px 0;
  }
  .pink { background: #ff69b4; }
  .blue { background: #87ceeb; }
  .green { background: #90ee90; }

  .candle {
    width: 12px;
    height: 40px;
    background: #ffd700;
    margin: 0 auto;
    position: relative;
  }
  .flame {
    width: 20px;
    height: 20px;
    background: orange;
    border-radius: 50%;
    position: absolute;
    top: -20px;
    left: -4px;
    animation: flicker 0.3s infinite alternate;
  }
  @keyframes flicker {
    from { transform: scale(1); opacity: 1; }
    to { transform: scale(1.2); opacity: 0.7; }
  }

  /* Messages */
  .message {
    font-size: 1.2em;
    margin: 10px;
    color: #333;
  }

  /* Balloons */
  .balloon {
    width: 40px;
    height: 50px;
    border-radius: 50%;
    position: absolute;
    bottom: -60px;
    animation: floatUp 8s linear forwards;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .string {
    width: 2px;
    height: 30px;
    background: black;
    margin-top: -5px;
  }

  @keyframes floatUp {
    0% { bottom: -60px; opacity: 1; }
    100% { bottom: 110%; opacity: 0; }
  }
</style>
</head>
<body>
  <h1>🎉 Happy Birthday Big Sis! 🎂</h1>

  <div class="cake">
    <!-- Candle on top -->
    <div class="candle">
      <div class="flame"></div>
    </div>
    <!-- Cake layers -->
    <div class="layer pink"></div>
    <div class="layer blue"></div>
    <div class="layer green"></div>
  </div>

  <div class="message">🌸 Thank you for being my eldest sister — my guide, my protector, my friend.</div>
  <div class="message">🌙 You’ve always been there for me, and I’m forever grateful.</div>
  <div class="message">🌟 May your life be filled with joy, love, and endless blessings!</div>

  <script>
    function createBalloon() {
      const balloon = document.createElement('div');
      balloon.classList.add('balloon');
      balloon.style.left = Math.random() * window.innerWidth + 'px';
      balloon.style.background = ['red','blue','green','purple','orange','pink'][Math.floor(Math.random()*6)];

      // Add string
      const string = document.createElement('div');
      string.classList.add('string');
      balloon.appendChild(string);

      document.body.appendChild(balloon);

      setTimeout(() => {
        balloon.remove();
      }, 8000);
    }

    // Keep balloons floating upward continuously
    setInterval(createBalloon, 700);
  </script>
</body>
</html>
