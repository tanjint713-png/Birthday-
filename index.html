<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      background: linear-gradient(to right, #ffecd2, #fcb69f);
      text-align: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
    }

    h1 {
      font-size: 3em;
      animation: colorchange 5s infinite;
    }

    @keyframes colorchange {
      0% { color: red; }
      25% { color: blue; }
      50% { color: green; }
      75% { color: purple; }
      100% { color: orange; }
    }

    .cake {
      margin: 50px auto;
      width: 200px;
      position: relative;
    }

    .tier {
      width: 100%;
      height: 80px;
      background: pink;
      border-radius: 10px;
      margin: auto;
      position: relative;
      animation: bounce 2s infinite;
    }

    .tier:nth-child(2) {
      width: 150px;
      background: lightblue;
      margin-top: -40px;
    }

    .tier:nth-child(3) {
      width: 100px;
      background: lightgreen;
      margin-top: -40px;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    .candle {
      width: 10px;
      height: 30px;
      background: yellow;
      margin: auto;
      position: relative;
      top: -20px;
    }

    .flame {
      width: 15px;
      height: 15px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -15px;
      left: -2px;
      animation: flicker 0.3s infinite;
    }

    @keyframes flicker {
      0% { transform: scale(1); background: orange; }
      50% { transform: scale(1.2); background: gold; }
      100% { transform: scale(1); background: orange; }
    }
  </style>
</head>
<body>
  <h1>🎉 Happy Birthday Big Sis! 🎂</h1>
  <div class="cake">
    <div class="tier"></div>
    <div class="tier"></div>
    <div class="tier"></div>
    <div class="candle">
      <div class="flame"></div>
    </div>
  </div>
  <h2 style="color: magenta;">Wishing you joy & laughter!</h2>
  <h2 style="color: teal;">May your dreams come true!</h2>
  <h2 style="color: gold;">Stay blessed always!</h2>
</body>
</html>
