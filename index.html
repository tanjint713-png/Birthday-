<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday!</title>
  <style>
    body {
      background: linear-gradient(to right, #ffe0f0, #fff5cc);
      text-align: center;
      font-family: 'Comic Sans MS', cursive, sans-serif;
      overflow: hidden;
    }

    h1 {
      font-size: 3em;
      margin-top: 20px;
      animation: colorchange 5s infinite;
    }

    @keyframes colorchange {
      0% { color: red; }
      25% { color: blue; }
      50% { color: green; }
      75% { color: purple; }
      100% { color: orange; }
    }

    /* Cake */
    .cake {
      margin: 40px auto;
      position: relative;
      width: 220px;
    }

    .tier {
      height: 80px;
      border-radius: 15px;
      margin: 10px auto;
      animation: bounce 2s infinite;
    }

    .tier.bottom { width: 220px; background: pink; }
    .tier.middle { width: 160px; background: lightblue; }
    .tier.top { width: 100px; background: lightgreen; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    /* Candle */
    .candle {
      width: 12px;
      height: 40px;
      background: yellow;
      margin: auto;
      position: relative;
      top: -20px;
    }

    .flame {
      width: 18px;
      height: 18px;
      background: orange;
      border-radius: 50%;
      position: absolute;
      top: -18px;
      left: -3px;
      animation: flicker 0.3s infinite;
    }

    @keyframes flicker {
      0% { transform: scale(1); background: orange; }
      50% { transform: scale(1.3); background: gold; }
      100% { transform: scale(1); background: orange; }
    }

    /* Wishes */
    .wishes {
      margin-top: 30px;
    }

    .wishes h2 {
      margin: 10px;
      font-size: 1.8em;
      animation: fade 4s infinite;
    }

    .wishes h2:nth-child(1) { color: magenta; }
    .wishes h2:nth-child(2) { color: teal; }
    .wishes h2:nth-child(3) { color: gold; }

    @keyframes fade {
      0% { opacity: 0.3; }
      50% { opacity: 1; }
      100% { opacity: 0.3; }
    }

    /* Balloons */
    .balloon {
      width: 40px;
      height: 60px;
      border-radius: 50% 50% 50% 50%;
      position: absolute;
      bottom: -100px;
      animation: float 10s infinite;
    }

    .balloon::after {
      content: "";
      width: 2px;
      height: 50px;
      background: black;
      position: absolute;
      top: 60px;
      left: 19px;
    }
